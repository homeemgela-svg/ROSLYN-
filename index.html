<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROSLYN Music Training App</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>🎵 ROSLYN</h1>
    <p class="subtitle">Your Friendly AI Music Training Companion</p>

    <div class="theme-section">
        <label>Choose Background Theme:</label>
        <input type="color" id="bgColor">
    </div>

    <div class="recorder-section">
        <h2>Recording Studio</h2>

        <button id="startBtn">Start Recording</button>
        <button id="stopBtn">Stop Recording</button>

        <audio id="audioPlayback" controls></audio>
    </div>

    <div class="upload-section">
        <h2>Upload Recording</h2>
        <input type="file" id="audioUpload" accept="audio/*">
    </div>

    <div class="reminder-section">
        <h2>Daily Reminder</h2>
        <button id="setReminder">Enable Daily Reminders</button>
    </div>

    <div class="ai-section">
        <h2>ROSLYN AI Assistant</h2>

        <div id="chatBox"></div>

        <input
        type="text"
        id="userInput"
        placeholder="Ask ROSLYN anything...">

        <button id="sendBtn">Send</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
